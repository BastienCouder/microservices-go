name: deploy-production

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      service:
        description: "Service Docker Compose a deployer (all, app, web, api-gateway, ...)"
        required: false
        default: "all"
      run_migrations:
        description: "Lancer les migrations DB (auto, true, false)"
        required: false
        default: "auto"
      run_certbot:
        description: "Relancer Certbot/Let's Encrypt"
        required: false
        default: "false"

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Ansible
        run: python -m pip install ansible-core

      - name: Ansible syntax check
        run: ansible-playbook -i ansible/inventory/production.ini ansible/playbooks/deploy.yml --syntax-check

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.PRODUCTION_SSH_PRIVATE_KEY }}

      - name: Trust production host key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PRODUCTION_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Compute deploy scope
        id: scope
        run: |
          set -euo pipefail

          RUN_MIGRATIONS_INPUT="auto"
          RUN_CERTBOT="false"
          MIGRATIONS='["kratos-migrate","user-migrate","organizations-migrate","permission-migrate","billing-migrate","project-migrate","analysis-migrate","ia-migrate","notification-migrate"]'

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SERVICE="${{ github.event.inputs.service || 'all' }}"
            RUN_MIGRATIONS_INPUT="${{ github.event.inputs.run_migrations || 'auto' }}"
            RUN_CERTBOT="${{ github.event.inputs.run_certbot || 'false' }}"
          else
            if git rev-parse --verify "${{ github.event.before }}" >/dev/null 2>&1; then
              mapfile -t CHANGED_FILES < <(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}")
            else
              mapfile -t CHANGED_FILES < <(git diff --name-only HEAD~1 HEAD)
            fi

            if [ "${#CHANGED_FILES[@]}" -eq 0 ]; then
              SERVICE="all"
            else
              SERVICE="all"

              if ! printf '%s\n' "${CHANGED_FILES[@]}" | grep -qv '^apps/app/'; then
                SERVICE="app"
              elif ! printf '%s\n' "${CHANGED_FILES[@]}" | grep -qv '^apps/web/'; then
                SERVICE="web"
              elif ! printf '%s\n' "${CHANGED_FILES[@]}" | grep -qv '^services/api-gateway/'; then
                SERVICE="api-gateway"
              elif ! printf '%s\n' "${CHANGED_FILES[@]}" | grep -qv '^services/user-service/'; then
                SERVICE="user-service"
              elif ! printf '%s\n' "${CHANGED_FILES[@]}" | grep -qv '^services/organizations-service/'; then
                SERVICE="organizations-service"
              elif ! printf '%s\n' "${CHANGED_FILES[@]}" | grep -qv '^services/permission-service/'; then
                SERVICE="permission-service"
              elif ! printf '%s\n' "${CHANGED_FILES[@]}" | grep -qv '^services/billing-service/'; then
                SERVICE="billing-service"
              elif ! printf '%s\n' "${CHANGED_FILES[@]}" | grep -qv '^services/project-service/'; then
                SERVICE="project-service"
              elif ! printf '%s\n' "${CHANGED_FILES[@]}" | grep -qv '^services/analysis-service/'; then
                SERVICE="analysis-service"
              elif ! printf '%s\n' "${CHANGED_FILES[@]}" | grep -qv '^services/ia-service/'; then
                SERVICE="ia-service"
              elif ! printf '%s\n' "${CHANGED_FILES[@]}" | grep -qv '^services/notification-service/'; then
                SERVICE="notification-service"
              elif ! printf '%s\n' "${CHANGED_FILES[@]}" | grep -qv '^services/crawler-service/'; then
                SERVICE="crawler-service"
              elif ! printf '%s\n' "${CHANGED_FILES[@]}" | grep -qv '^deployments/kratos/'; then
                SERVICE="kratos"
              fi
            fi
          fi

          case "$SERVICE" in
            app|web)
              DEFAULT_RUN_MIGRATIONS="false"
              MIGRATIONS="[]"
              ;;
            kratos)
              DEFAULT_RUN_MIGRATIONS="true"
              MIGRATIONS='["kratos-migrate"]'
              ;;
            user-service)
              DEFAULT_RUN_MIGRATIONS="true"
              MIGRATIONS='["user-migrate"]'
              ;;
            organizations-service)
              DEFAULT_RUN_MIGRATIONS="true"
              MIGRATIONS='["organizations-migrate"]'
              ;;
            permission-service)
              DEFAULT_RUN_MIGRATIONS="true"
              MIGRATIONS='["permission-migrate"]'
              ;;
            billing-service)
              DEFAULT_RUN_MIGRATIONS="true"
              MIGRATIONS='["billing-migrate"]'
              ;;
            project-service)
              DEFAULT_RUN_MIGRATIONS="true"
              MIGRATIONS='["project-migrate"]'
              ;;
            analysis-service)
              DEFAULT_RUN_MIGRATIONS="true"
              MIGRATIONS='["analysis-migrate"]'
              ;;
            ia-service)
              DEFAULT_RUN_MIGRATIONS="true"
              MIGRATIONS='["ia-migrate"]'
              ;;
            notification-service)
              DEFAULT_RUN_MIGRATIONS="true"
              MIGRATIONS='["notification-migrate"]'
              ;;
            api-gateway|crawler-service)
              DEFAULT_RUN_MIGRATIONS="false"
              MIGRATIONS="[]"
              ;;
            *)
              DEFAULT_RUN_MIGRATIONS="true"
              ;;
          esac

          if [ "$RUN_MIGRATIONS_INPUT" = "auto" ]; then
            RUN_MIGRATIONS="$DEFAULT_RUN_MIGRATIONS"
          else
            RUN_MIGRATIONS="$RUN_MIGRATIONS_INPUT"
          fi

          echo "service=$SERVICE" >> "$GITHUB_OUTPUT"
          echo "run_migrations=$RUN_MIGRATIONS" >> "$GITHUB_OUTPUT"
          echo "run_certbot=$RUN_CERTBOT" >> "$GITHUB_OUTPUT"
          echo "migrations=$MIGRATIONS" >> "$GITHUB_OUTPUT"
          echo "Deploy scope: $SERVICE"
          echo "Run migrations: $RUN_MIGRATIONS"
          echo "Run certbot: $RUN_CERTBOT"
          echo "Migrations: $MIGRATIONS"

      - name: Deploy production stack
        env:
          PRODUCTION_GITHUB_DEPLOY_KEY: ${{ secrets.PRODUCTION_GITHUB_DEPLOY_KEY }}
          PRODUCTION_GITHUB_DEPLOY_KEY_B64: ${{ secrets.PRODUCTION_GITHUB_DEPLOY_KEY_B64 }}
        run: |
          SERVICE="${{ steps.scope.outputs.service }}"
          EXTRA_ARGS=()

          if [ -n "$PRODUCTION_GITHUB_DEPLOY_KEY_B64" ] || [ -n "$PRODUCTION_GITHUB_DEPLOY_KEY" ]; then
            DEPLOY_KEY_FILE="$RUNNER_TEMP/production_github_deploy_key"

            if [ -n "$PRODUCTION_GITHUB_DEPLOY_KEY_B64" ]; then
              printf '%s' "$PRODUCTION_GITHUB_DEPLOY_KEY_B64" | base64 -d > "$DEPLOY_KEY_FILE"
            else
              printf '%s\n' "$PRODUCTION_GITHUB_DEPLOY_KEY" > "$DEPLOY_KEY_FILE"
            fi

            sed -i 's/\r$//' "$DEPLOY_KEY_FILE"
            chmod 600 "$DEPLOY_KEY_FILE"
            ssh-keygen -y -f "$DEPLOY_KEY_FILE" >/dev/null
            EXTRA_ARGS+=(-e "repo_deploy_private_key_file=$DEPLOY_KEY_FILE")
          fi

          if [ "$SERVICE" = "all" ]; then
            ansible-playbook \
              -i ansible/inventory/production.ini \
              ansible/playbooks/deploy.yml \
              -e "ansible_become_password=${{ secrets.PRODUCTION_BECOME_PASSWORD }}" \
              -e "deploy_run_migrations=${{ steps.scope.outputs.run_migrations }}" \
              -e "deploy_run_certbot=${{ steps.scope.outputs.run_certbot }}" \
              -e '{"migration_services":${{ steps.scope.outputs.migrations }}}' \
              "${EXTRA_ARGS[@]}"
          else
            ansible-playbook \
              -i ansible/inventory/production.ini \
              ansible/playbooks/deploy.yml \
              -e "ansible_become_password=${{ secrets.PRODUCTION_BECOME_PASSWORD }}" \
              "${EXTRA_ARGS[@]}" \
              -e "deploy_run_migrations=${{ steps.scope.outputs.run_migrations }}" \
              -e "deploy_run_certbot=${{ steps.scope.outputs.run_certbot }}" \
              -e '{"migration_services":${{ steps.scope.outputs.migrations }}}' \
              -e "{\"deploy_services\":[\"$SERVICE\"]}"
          fi
