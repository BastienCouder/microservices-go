      STRIPE_CHECKOUT_SUCCESS_URL_FILE: /run/secrets/stripe_checkout_success_url
      STRIPE_CHECKOUT_CANCEL_URL_FILE: /run/secrets/stripe_checkout_cancel_url
      STRIPE_CUSTOMER_PORTAL_RETURN_URL_FILE: /run/secrets/stripe_customer_portal_return_url
