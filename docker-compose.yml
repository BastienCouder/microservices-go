services:
  web:
    profiles: ["frontend"]
    build:
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_GATEWAY_URL: http://localhost:8080
        NEXT_PUBLIC_APP_URL: http://localhost:19020
    image: microservices-go/web:prod
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_GATEWAY_URL: http://localhost:8080
      NEXT_PUBLIC_APP_URL: http://localhost:19020
    ports:
      - "3000:8080"

  app:
    profiles: ["frontend"]
    build:
      dockerfile: apps/app/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8080
        VITE_WEB_AUTH_URL: http://localhost:3000/auth
    image: microservices-go/app:prod
    restart: unless-stopped
    ports:
      - "19020:8080"

  doc:
    profiles: ["doc"]
    build:
      dockerfile: apps/doc/Dockerfile
    image: microservices-go/doc:prod
    restart: unless-stopped
    ports:
      - "3001:8080"

  email:
    profiles: ["email"]
    build:
      dockerfile: apps/email/Dockerfile
    image: microservices-go/email:prod
    restart: unless-stopped
    environment:
      EMAIL_API_PORT: "3002"
    ports:
      - "3002:3002"

  mcp-server:
    profiles: ["mcp"]
    build:
      dockerfile: Dockerfile
      args:
        SERVICE_PATH: ./services/mcp-server/cmd/server
    image: microservices-go/mcp-server:prod
    restart: unless-stopped
    command: ["--transport", "http", "--http-addr", ":8090"]
    ports:
      - "8090:8090"

  api-gateway:
    profiles: ["backend"]
    build:
      dockerfile: Dockerfile
      args:
        SERVICE_PATH: ./services/api-gateway/cmd/api
    image: microservices-go/api-gateway:prod
    restart: unless-stopped
    environment:
      HTTP_ADDR: :8080
      USER_SERVICE_URL: http://user-service:8081
      AUTH_SERVICE_URL: http://auth-service:8083
      ORGANIZATIONS_SERVICE_URL: http://organizations-service:8084
      PERMISSION_SERVICE_URL: http://permission-service:8085
      PERMISSION_SERVICE_GRPC_ADDR: permission-service:9085
      BILLING_SERVICE_URL: http://billing-service:8086
      NOTIFICATION_SERVICE_URL: http://notification-service:8087
      PROJECT_SERVICE_URL: http://project-service:8088
      ANALYSIS_SERVICE_URL: http://analysis-service:8089
      IA_SERVICE_URL: http://ia-service:8091
      ATTRIBUTION_SERVICE_URL: http://attribution-service:8092
      RATE_LIMIT_RPM: "120"
      INTERNAL_JWT_SECRET: ${INTERNAL_JWT_SECRET:?INTERNAL_JWT_SECRET must be set}
      INTERNAL_JWT_ISSUER: api-gateway
      PERMISSION_GRPC_ALLOW_INSECURE: "true"
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:19020
    ports:
      - "8080:8080"

  auth-service:
    profiles: ["backend"]
    build:
      dockerfile: Dockerfile
      args:
        SERVICE_PATH: ./services/auth-service/cmd/api
    image: microservices-go/auth-service:prod
    restart: unless-stopped
    environment:
      HTTP_ADDR: :8083
      KRATOS_PUBLIC_URL: http://kratos:4433
      KRATOS_BROWSER_URL: http://localhost:4433
      ALLOWED_ORIGIN: http://localhost:3000
      INTERNAL_JWT_SECRET: ${INTERNAL_JWT_SECRET:?INTERNAL_JWT_SECRET must be set}
      INTERNAL_JWT_ISSUER: api-gateway
    ports:
      - "8083:8083"

  user-service:
    profiles: ["backend"]
    build:
      dockerfile: Dockerfile
      args:
        SERVICE_PATH: ./services/user-service/cmd/api
    image: microservices-go/user-service:prod
    restart: unless-stopped
    environment:
      HTTP_ADDR: :8081
      USER_DB_HOST: postgres
      USER_DB_PORT: "5432"
      USER_DB_USER: usersvc
      USER_DB_NAME: usersvc
      USER_DB_SSLMODE: disable
      USER_DB_PASSWORD_FILE: /run/secrets/usersvc_db_password
      INTERNAL_JWT_SECRET: ${INTERNAL_JWT_SECRET:?INTERNAL_JWT_SECRET must be set}
      INTERNAL_JWT_ISSUER: api-gateway
    secrets:
      - usersvc_db_password
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "/app/service", "healthcheck"]
      interval: 20s
      timeout: 3s
      retries: 3
      start_period: 15s

  user-migrate:
    profiles: ["migrations"]
    build:
      dockerfile: Dockerfile
      args:
        SERVICE_PATH: ./services/user-service/cmd/migrate
    image: microservices-go/user-migrate:prod
    environment:
      USER_DB_HOST: postgres
      USER_DB_PORT: "5432"
      USER_DB_USER: usersvc
      USER_DB_NAME: usersvc
      USER_DB_SSLMODE: disable
      USER_DB_PASSWORD_FILE: /run/secrets/usersvc_db_password
    secrets:
      - usersvc_db_password

  organizations-service:
    profiles: ["backend"]
    build:
      dockerfile: Dockerfile
      args:
        SERVICE_PATH: ./services/organizations-service/cmd/api
    image: microservices-go/organizations-service:prod
    restart: unless-stopped
    environment:
      HTTP_ADDR: :8084
      ORG_DB_HOST: postgres
      ORG_DB_PORT: "5432"
      ORG_DB_USER: orgsvc
      ORG_DB_NAME: orgsvc
      ORG_DB_SSLMODE: disable
      ORG_DB_PASSWORD_FILE: /run/secrets/orgsvc_db_password
      INTERNAL_JWT_SECRET: ${INTERNAL_JWT_SECRET:?INTERNAL_JWT_SECRET must be set}
      INTERNAL_JWT_ISSUER: api-gateway
    secrets:
      - orgsvc_db_password
    ports:
      - "8084:8084"
    healthcheck:
      test: ["CMD", "/app/service", "healthcheck"]
      interval: 20s
      timeout: 3s
      retries: 3
      start_period: 15s

  organizations-migrate:
    profiles: ["migrations"]
    build:
      dockerfile: Dockerfile
      args:
        SERVICE_PATH: ./services/organizations-service/cmd/migrate
    image: microservices-go/organizations-migrate:prod
    environment:
      ORG_DB_HOST: postgres
      ORG_DB_PORT: "5432"
      ORG_DB_USER: orgsvc
      ORG_DB_NAME: orgsvc
      ORG_DB_SSLMODE: disable
      ORG_DB_PASSWORD_FILE: /run/secrets/orgsvc_db_password
    secrets:
      - orgsvc_db_password

  permission-service:
    profiles: ["backend"]
    build:
      dockerfile: Dockerfile
      args:
        SERVICE_PATH: ./services/permission-service/cmd/api
    image: microservices-go/permission-service:prod
    restart: unless-stopped
    environment:
      HTTP_ADDR: :8085
      GRPC_ADDR: :9085
      PERMISSION_DB_HOST: postgres
      PERMISSION_DB_PORT: "5432"
      PERMISSION_DB_USER: permsvc
      PERMISSION_DB_NAME: permsvc
      PERMISSION_DB_SSLMODE: disable
      PERMISSION_DB_PASSWORD_FILE: /run/secrets/permsvc_db_password
      ORGANIZATIONS_SERVICE_URL: http://organizations-service:8084
      INTERNAL_JWT_SECRET: ${INTERNAL_JWT_SECRET:?INTERNAL_JWT_SECRET must be set}
      INTERNAL_JWT_ISSUER: api-gateway
      GRPC_ALLOW_INSECURE: "true"
    secrets:
      - permsvc_db_password
    ports:
      - "8085:8085"
    healthcheck:
      test: ["CMD", "/app/service", "healthcheck"]
      interval: 20s
      timeout: 3s
      retries: 3
      start_period: 15s

  permission-migrate:
    profiles: ["migrations"]
    build:
      dockerfile: Dockerfile
      args:
        SERVICE_PATH: ./services/permission-service/cmd/migrate
    image: microservices-go/permission-migrate:prod
    environment:
      PERMISSION_DB_HOST: postgres
      PERMISSION_DB_PORT: "5432"
      PERMISSION_DB_USER: permsvc
      PERMISSION_DB_NAME: permsvc
      PERMISSION_DB_SSLMODE: disable
      PERMISSION_DB_PASSWORD_FILE: /run/secrets/permsvc_db_password
    secrets:
      - permsvc_db_password

  billing-service:
    profiles: ["backend"]
    build:
      dockerfile: Dockerfile
      args:
        SERVICE_PATH: ./services/billing-service/cmd/api
    image: microservices-go/billing-service:prod
    restart: unless-stopped
    environment:
      HTTP_ADDR: :8086
      BILLING_DB_HOST: postgres
      BILLING_DB_PORT: "5432"
      BILLING_DB_USER: billsvc
      BILLING_DB_NAME: billsvc
      BILLING_DB_SSLMODE: disable
      BILLING_DB_PASSWORD_FILE: /run/secrets/billsvc_db_password
      INTERNAL_JWT_SECRET: ${INTERNAL_JWT_SECRET:?INTERNAL_JWT_SECRET must be set}
      INTERNAL_JWT_ISSUER: api-gateway
    secrets:
      - billsvc_db_password
    ports:
      - "8086:8086"
    healthcheck:
      test: ["CMD", "/app/service", "healthcheck"]
      interval: 20s
      timeout: 3s
      retries: 3
      start_period: 15s

  billing-migrate:
    profiles: ["migrations"]
    build:
      dockerfile: Dockerfile
      args:
        SERVICE_PATH: ./services/billing-service/cmd/migrate
    image: microservices-go/billing-migrate:prod
    environment:
      BILLING_DB_HOST: postgres
      BILLING_DB_PORT: "5432"
      BILLING_DB_USER: billsvc
      BILLING_DB_NAME: billsvc
      BILLING_DB_SSLMODE: disable
      BILLING_DB_PASSWORD_FILE: /run/secrets/billsvc_db_password
    secrets:
      - billsvc_db_password

  notification-service:
    profiles: ["backend"]
    build:
      dockerfile: Dockerfile
      args:
        SERVICE_PATH: ./services/notification-service/cmd/api
    image: microservices-go/notification-service:prod
    restart: unless-stopped
    environment:
      HTTP_ADDR: :8087
      NOTIFICATION_DB_HOST: postgres
      NOTIFICATION_DB_PORT: "5432"
      NOTIFICATION_DB_USER: notifsvc
      NOTIFICATION_DB_NAME: notifsvc
      NOTIFICATION_DB_SSLMODE: disable
      NOTIFICATION_DB_PASSWORD_FILE: /run/secrets/notifsvc_db_password
      EMAIL_RENDERER_URL: http://email:3002
      RESEND_API_KEY_FILE: /run/secrets/resend_api_key
      RESEND_FROM_EMAIL: noreply@example.com
      INTERNAL_JWT_SECRET: ${INTERNAL_JWT_SECRET:?INTERNAL_JWT_SECRET must be set}
      INTERNAL_JWT_ISSUER: api-gateway
    secrets:
      - notifsvc_db_password
      - resend_api_key
    ports:
      - "8087:8087"
    healthcheck:
      test: ["CMD", "/app/service", "healthcheck"]
      interval: 20s
      timeout: 3s
      retries: 3
      start_period: 15s

  project-service:
    profiles: ["backend"]
    build:
      dockerfile: Dockerfile
      args:
        SERVICE_PATH: ./services/project-service/cmd/api
    image: microservices-go/project-service:prod
    restart: unless-stopped
    environment:
      HTTP_ADDR: :8088
      GRPC_ADDR: :9088
      PROJECT_DB_HOST: postgres
      PROJECT_DB_PORT: "5432"
      PROJECT_DB_USER: projectsvc
      PROJECT_DB_NAME: projectsvc
      PROJECT_DB_SSLMODE: disable
      PROJECT_DB_PASSWORD_FILE: /run/secrets/projectsvc_db_password
      ANALYSIS_SERVICE_GRPC_ADDR: analysis-service:9089
      IA_SERVICE_GRPC_ADDR: ia-service:9091
      RABBITMQ_URL: ${RABBITMQ_URL:?RABBITMQ_URL must be set}
      RABBITMQ_EXCHANGE: microservices.events
      RABBITMQ_PROJECT_FINALIZE_QUEUE: project.finalize
      RABBITMQ_PROJECT_FINALIZE_ROUTING_KEY: project.finalized
      INTERNAL_JWT_SECRET: ${INTERNAL_JWT_SECRET:?INTERNAL_JWT_SECRET must be set}
      INTERNAL_JWT_ISSUER: api-gateway
      GRPC_ALLOW_INSECURE: "true"
    secrets:
      - projectsvc_db_password
    ports:
      - "8088:8088"
      - "9088:9088"
    healthcheck:
      test: ["CMD", "/app/service", "healthcheck"]
      interval: 20s
      timeout: 3s
      retries: 3
      start_period: 15s

  analysis-service:
    profiles: ["backend"]
    build:
      dockerfile: Dockerfile
      args:
        SERVICE_PATH: ./services/analysis-service/cmd/api
    image: microservices-go/analysis-service:prod
    restart: unless-stopped
    environment:
      HTTP_ADDR: :8089
      GRPC_ADDR: :9089
      ANALYSIS_DB_HOST: postgres
      ANALYSIS_DB_PORT: "5432"
      ANALYSIS_DB_USER: analysissvc
      ANALYSIS_DB_NAME: analysissvc
      ANALYSIS_DB_SSLMODE: disable
      ANALYSIS_DB_PASSWORD_FILE: /run/secrets/analysissvc_db_password
      PROJECT_SERVICE_GRPC_ADDR: project-service:9088
      INTERNAL_JWT_SECRET: ${INTERNAL_JWT_SECRET:?INTERNAL_JWT_SECRET must be set}
      INTERNAL_JWT_ISSUER: api-gateway
      GRPC_ALLOW_INSECURE: "true"
    secrets:
      - analysissvc_db_password
    ports:
      - "8089:8089"
      - "9089:9089"
    healthcheck:
      test: ["CMD", "/app/service", "healthcheck"]
      interval: 20s
      timeout: 3s
      retries: 3
      start_period: 15s

  ia-service:
    profiles: ["backend"]
    build:
      dockerfile: Dockerfile
      args:
        SERVICE_PATH: ./services/ia-service/cmd/api
    image: microservices-go/ia-service:prod
    restart: unless-stopped
    environment:
      HTTP_ADDR: :8091
      GRPC_ADDR: :9091
      IA_EXECUTION_MODE: mock
      IA_PROVIDER_TIMEOUT_MS: "5000"
      INTERNAL_JWT_SECRET: ${INTERNAL_JWT_SECRET:?INTERNAL_JWT_SECRET must be set}
      INTERNAL_JWT_ISSUER: api-gateway
      GRPC_ALLOW_INSECURE: "true"
    ports:
      - "8091:8091"
      - "9091:9091"
    healthcheck:
      test: ["CMD", "/app/service", "healthcheck"]
      interval: 20s
      timeout: 3s
      retries: 3
      start_period: 15s

  attribution-service:
    profiles: ["backend"]
    build:
      dockerfile: Dockerfile
      args:
        SERVICE_PATH: ./services/attribution-service/cmd/api
    image: microservices-go/attribution-service:prod
    restart: unless-stopped
    environment:
      HTTP_ADDR: :8092
      ATTRIBUTION_DB_HOST: postgres
      ATTRIBUTION_DB_PORT: "5432"
      ATTRIBUTION_DB_USER: attrsvc
      ATTRIBUTION_DB_NAME: attrsvc
      ATTRIBUTION_DB_SSLMODE: disable
      ATTRIBUTION_DB_PASSWORD_FILE: /run/secrets/attrsvc_db_password
      PROJECT_SERVICE_GRPC_ADDR: project-service:9088
      INTERNAL_JWT_SECRET: ${INTERNAL_JWT_SECRET:?INTERNAL_JWT_SECRET must be set}
      INTERNAL_JWT_ISSUER: api-gateway
      GRPC_ALLOW_INSECURE: "true"
    secrets:
      - attrsvc_db_password
    ports:
      - "8092:8092"
    healthcheck:
      test: ["CMD", "/app/service", "healthcheck"]
      interval: 20s
      timeout: 3s
      retries: 3
      start_period: 15s

  project-migrate:
    profiles: ["migrations"]
    build:
      dockerfile: Dockerfile
      args:
        SERVICE_PATH: ./services/project-service/cmd/migrate
    image: microservices-go/project-migrate:prod
    environment:
      PROJECT_DB_HOST: postgres
      PROJECT_DB_PORT: "5432"
      PROJECT_DB_USER: projectsvc
      PROJECT_DB_NAME: projectsvc
      PROJECT_DB_SSLMODE: disable
      PROJECT_DB_PASSWORD_FILE: /run/secrets/projectsvc_db_password
    secrets:
      - projectsvc_db_password

  analysis-migrate:
    profiles: ["migrations"]
    build:
      dockerfile: Dockerfile
      args:
        SERVICE_PATH: ./services/analysis-service/cmd/migrate
    image: microservices-go/analysis-migrate:prod
    environment:
      ANALYSIS_DB_HOST: postgres
      ANALYSIS_DB_PORT: "5432"
      ANALYSIS_DB_USER: analysissvc
      ANALYSIS_DB_NAME: analysissvc
      ANALYSIS_DB_SSLMODE: disable
      ANALYSIS_DB_PASSWORD_FILE: /run/secrets/analysissvc_db_password
    secrets:
      - analysissvc_db_password

  attribution-migrate:
    profiles: ["migrations"]
    build:
      dockerfile: Dockerfile
      args:
        SERVICE_PATH: ./services/attribution-service/cmd/migrate
    image: microservices-go/attribution-migrate:prod
    environment:
      ATTRIBUTION_DB_HOST: postgres
      ATTRIBUTION_DB_PORT: "5432"
      ATTRIBUTION_DB_USER: attrsvc
      ATTRIBUTION_DB_NAME: attrsvc
      ATTRIBUTION_DB_SSLMODE: disable
      ATTRIBUTION_DB_PASSWORD_FILE: /run/secrets/attrsvc_db_password
    secrets:
      - attrsvc_db_password

  notification-migrate:
    profiles: ["migrations"]
    build:
      dockerfile: Dockerfile
      args:
        SERVICE_PATH: ./services/notification-service/cmd/migrate
    image: microservices-go/notification-migrate:prod
    environment:
      NOTIFICATION_DB_HOST: postgres
      NOTIFICATION_DB_PORT: "5432"
      NOTIFICATION_DB_USER: notifsvc
      NOTIFICATION_DB_NAME: notifsvc
      NOTIFICATION_DB_SSLMODE: disable
      NOTIFICATION_DB_PASSWORD_FILE: /run/secrets/notifsvc_db_password
    secrets:
      - notifsvc_db_password

  loki:
    profiles: ["monitoring"]
    image: grafana/loki:3.0.0
    restart: unless-stopped
    command: ["-config.file=/etc/loki/config.yaml"]
    volumes:
      - ./deployments/loki/loki-config.yaml:/etc/loki/config.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"

  promtail:
    profiles: ["monitoring"]
    image: grafana/promtail:3.0.0
    restart: unless-stopped
    command: ["-config.file=/etc/promtail/config.yaml"]
    volumes:
      - ./deployments/loki/promtail-config.yaml:/etc/promtail/config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail-positions:/tmp

  grafana:
    profiles: ["monitoring"]
    image: grafana/grafana:11.0.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deployments/loki/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3010:3000"

  prometheus:
    profiles: ["monitoring"]
    image: prom/prometheus:v3.3.1
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
    volumes:
      - ./deployments/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"

  redis:
    profiles: ["backend", "infra"]
    image: redis:8.4.0-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  rabbitmq:
    profiles: ["backend", "infra"]
    image: rabbitmq:4.2.3-management-alpine
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - ./deployments/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./deployments/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres:
    profiles: ["backend", "infra"]
    image: postgres:18.1-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_superuser_password
      POSTGRES_DB: postgres
    secrets:
      - postgres_superuser_password
    volumes:
      - ./deployments/postgres/init-multiple-databases.sql:/docker-entrypoint-initdb.d/init-multiple-databases.sql:ro
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  kratos-migrate:
    profiles: ["migrations"]
    image: oryd/kratos:v25.4.0
    entrypoint: ["sh", "/etc/config/kratos/migrate.sh"]
    environment:
      KRATOS_DB_HOST: postgres
      KRATOS_DB_PORT: "5432"
      KRATOS_DB_USER: kratos
      KRATOS_DB_NAME: kratos
      KRATOS_DB_SSLMODE: disable
      KRATOS_DB_PASSWORD_FILE: /run/secrets/kratos_db_password
    secrets:
      - kratos_db_password
      - resend_smtp_connection_uri
      - google_oidc_client_id
      - google_oidc_client_secret
    volumes:
      - ./deployments/kratos:/etc/config/kratos:ro

  kratos:
    profiles: ["backend", "infra"]
    image: oryd/kratos:v25.4.0
    restart: unless-stopped
    entrypoint: ["sh", "/etc/config/kratos/start-prod.sh"]
    environment:
      KRATOS_DB_HOST: postgres
      KRATOS_DB_PORT: "5432"
      KRATOS_DB_USER: kratos
      KRATOS_DB_NAME: kratos
      KRATOS_DB_SSLMODE: disable
      KRATOS_DB_PASSWORD_FILE: /run/secrets/kratos_db_password
    secrets:
      - kratos_db_password
      - resend_smtp_connection_uri
      - google_oidc_client_id
      - google_oidc_client_secret
    ports:
      - "4433:4433"
      - "4434:4434"
    volumes:
      - ./deployments/kratos:/etc/config/kratos:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:4433/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  redis-data:
  rabbitmq-data:
  postgres-data:
  loki-data:
  promtail-positions:
  grafana-data:
  prometheus-data:

secrets:
  postgres_superuser_password:
    file: ./deployments/secrets/postgres_superuser_password.txt
  usersvc_db_password:
    file: ./deployments/secrets/usersvc_db_password.txt
  orgsvc_db_password:
    file: ./deployments/secrets/orgsvc_db_password.txt
  permsvc_db_password:
    file: ./deployments/secrets/permsvc_db_password.txt
  billsvc_db_password:
    file: ./deployments/secrets/billsvc_db_password.txt
  notifsvc_db_password:
    file: ./deployments/secrets/notifsvc_db_password.txt
  projectsvc_db_password:
    file: ./deployments/secrets/projectsvc_db_password.txt
  analysissvc_db_password:
    file: ./deployments/secrets/analysissvc_db_password.txt
  attrsvc_db_password:
    file: ./deployments/secrets/attrsvc_db_password.txt
  kratos_db_password:
