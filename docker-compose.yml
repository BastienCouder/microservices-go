      BILLING_SERVICE_URL: http://billing-service:8086
      ANALYSIS_SERVICE_GRPC_ADDR: analysis-service:9089
      IA_SERVICE_GRPC_ADDR: ia-service:9091
      PROJECT_IA_PROMPT_TIMEOUT_MS: "30000"
      RABBITMQ_URL_FILE: /run/secrets/rabbitmq_url
      RABBITMQ_EXCHANGE: microservices.events
      RABBITMQ_PROJECT_FINALIZE_QUEUE: project.finalize
      RABBITMQ_PROJECT_FINALIZE_ROUTING_KEY: project.finalized
      INTERNAL_JWT_SECRET_FILE: /run/secrets/internal_jwt_secret
      INTERNAL_JWT_ISSUER: api-gateway
      PROJECT_SECRET_ENCRYPTION_KEY_FILE: /run/secrets/internal_jwt_secret
