      STRIPE_PRICE_STARTER_YEARLY_FILE: /run/secrets/stripe_price_starter_yearly
      STRIPE_PRICE_GROWTH_MONTHLY_FILE: /run/secrets/stripe_price_growth_monthly
      STRIPE_PRICE_GROWTH_YEARLY_FILE: /run/secrets/stripe_price_growth_yearly
      STRIPE_PRICE_PRO_MONTHLY_FILE: /run/secrets/stripe_price_pro_monthly
      STRIPE_PRICE_PRO_YEARLY_FILE: /run/secrets/stripe_price_pro_yearly
      STRIPE_PRICE_CORRECTION_CREDITS_FILE: /run/secrets/stripe_price_correction_credits
    secrets:
      - billsvc_db_password
      - internal_jwt_secret
      - stripe_secret_key
      - stripe_webhook_secret
      - stripe_enabled
      - stripe_checkout_success_url
      - stripe_checkout_cancel_url
      - stripe_customer_portal_return_url
      - stripe_price_starter_monthly
      - stripe_price_starter_yearly
      - stripe_price_growth_monthly
      - stripe_price_growth_yearly
      - stripe_price_pro_monthly
      - stripe_price_pro_yearly
      - stripe_price_correction_credits
    # Port non exposé publiquement — accessible uniquement via api-gateway
    healthcheck:
      test: ["CMD", "/app/service", "healthcheck"]
      interval: 20s
      timeout: 3s
