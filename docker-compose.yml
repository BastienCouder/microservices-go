      INTERNAL_JWT_ISSUER: api-gateway
      GRPC_ALLOW_INSECURE: "true"
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD_FILE: /run/secrets/redis_password
      DASHBOARD_CACHE_TTL: 30s
      CLOUDFLARE_ACCOUNT_ID_FILE: /run/secrets/cloudflare_account_id
      CLOUDFLARE_API_TOKEN_FILE: /run/secrets/cloudflare_api_token
      IA_SERVICE_URL: http://ia-service:8091
      CONTENT_ISSUE_ANALYZER_MODEL_ID: gpt-oss-20b-free
      CONTENT_ISSUE_ANALYZER_PROVIDER_ID: openrouter
      OPTIMIZE_ACTION_BRIEF_MODEL_ID: z-ai/glm-4.5-air:free
      OPTIMIZE_ACTION_BRIEF_PROVIDER_ID: openrouter
    secrets:
      - analysissvc_db_password
      - internal_jwt_secret
      - redis_password
      - cloudflare_account_id
      - cloudflare_api_token
    # gRPC port exposé uniquement en interne (pas de port HTTP public)
    ports:
      - "127.0.0.1:9089:9089"
    healthcheck:
      test: ["CMD", "/app/service", "healthcheck"]
      interval: 20s
      timeout: 3s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
 
  ia-service:
    profiles: ["backend"]
    build:
      dockerfile: Dockerfile
      args:
        SERVICE_PATH: ia-service/cmd/api
    image: microservices-go/ia-service:prod
    restart: unless-stopped
    networks:
      - backend-net
      - infra-net
    environment:
      HTTP_ADDR: :8091
      METRICS_ADDR: :9090
      GRPC_ADDR: :9091
      IA_DB_HOST: postgres
      IA_DB_PORT: "5432"
      IA_DB_USER: iasvc
      IA_DB_NAME: iasvc
      IA_DB_SSLMODE: disable
      IA_DB_PASSWORD_FILE: /run/secrets/iasvc_db_password
      IA_EXECUTION_MODE: provider
      IA_PROVIDER_BASE_URL: https://openrouter.ai/api/v1
      IA_PROVIDER_API_KEY_FILE: /run/secrets/openrouter_api_key
      IA_PROVIDER_HTTP_REFERER: http://localhost:30004
      IA_PROVIDER_APP_NAME: microservices-go
      IA_PROVIDER_TIMEOUT_MS: "30000"
      INTERNAL_JWT_SECRET_FILE: /run/secrets/internal_jwt_secret
      INTERNAL_JWT_ISSUER: api-gateway
      GRPC_ALLOW_INSECURE: "true"
    secrets:
      - iasvc_db_password
      - internal_jwt_secret
      - openrouter_api_key
    # gRPC port exposé uniquement en interne (pas de port HTTP public)
    ports:
      - "127.0.0.1:9091:9091"
    healthcheck:
      test: ["CMD", "/app/service", "healthcheck"]
      interval: 20s
      timeout: 3s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
 
  attribution-service:
    profiles: ["backend"]
    build:
      dockerfile: Dockerfile
      args:
        SERVICE_PATH: attribution-service/cmd/api
    image: microservices-go/attribution-service:prod
    restart: unless-stopped
    networks:
      - backend-net
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      HTTP_ADDR: :8092
      METRICS_ADDR: :9090
      PROJECT_SERVICE_GRPC_ADDR: project-service:9088
      INTERNAL_JWT_SECRET_FILE: /run/secrets/internal_jwt_secret
      INTERNAL_JWT_ISSUER: api-gateway
      GRPC_ALLOW_INSECURE: "true"
      GA4_OAUTH_CLIENT_ID_FILE: /run/secrets/ga4_oauth_client_id
      GA4_OAUTH_CLIENT_SECRET_FILE: /run/secrets/ga4_oauth_client_secret
      ATTRIBUTION_ENABLE_FAKE_TRAFFIC: "false"
    secrets:
      - internal_jwt_secret
      - ga4_oauth_client_id
      - ga4_oauth_client_secret
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
 
  langgraph-scheduler:
    profiles: ["backend"]
    build:
      context: .
      dockerfile: services/langgraph-scheduler/Dockerfile
    image: microservices-go/langgraph-scheduler:prod
    restart: unless-stopped
    networks:
      - backend-net
    environment:
      PROJECT_SERVICE_GRPC_ADDR: project-service:9088
      ANALYSIS_SERVICE_GRPC_ADDR: analysis-service:9089
      IA_SERVICE_GRPC_ADDR: ia-service:9091
      INTERNAL_JWT_SECRET_FILE: /run/secrets/internal_jwt_secret
      INTERNAL_JWT_ISSUER: api-gateway
      INTERNAL_SERVICE_SUBJECT: langgraph-scheduler
      GRPC_ALLOW_INSECURE: "true"
      SCHEDULER_POLL_INTERVAL_MS: "30000"
    secrets:
      - internal_jwt_secret
    healthcheck:
      test: ["CMD", "/nodejs/bin/node", "-e", "const fs=require('fs');process.exit(fs.readFileSync('/proc/1/cmdline','utf8').includes('dist/index.js')?0:1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
 
  project-migrate:
    profiles: ["migrations"]
    build:
      dockerfile: Dockerfile
      args:
        SERVICE_PATH: project-service/cmd/migrate
    image: microservices-go/project-migrate:prod
    networks:
      - infra-net
    environment:
      PROJECT_DB_HOST: postgres
      PROJECT_DB_PORT: "5432"
      PROJECT_DB_USER: projectsvc
      PROJECT_DB_NAME: projectsvc
      PROJECT_DB_SSLMODE: disable
      PROJECT_DB_PASSWORD_FILE: /run/secrets/projectsvc_db_password
    secrets:
      - projectsvc_db_password
 
  analysis-migrate:
    profiles: ["migrations"]
    build:
      dockerfile: Dockerfile
      args:
        SERVICE_PATH: analysis-service/cmd/migrate
    image: microservices-go/analysis-migrate:prod
    networks:
      - infra-net
    environment:
      ANALYSIS_DB_HOST: postgres
      ANALYSIS_DB_PORT: "5432"
      ANALYSIS_DB_USER: analysissvc
      ANALYSIS_DB_NAME: analysissvc
      ANALYSIS_DB_SSLMODE: disable
      ANALYSIS_DB_PASSWORD_FILE: /run/secrets/analysissvc_db_password
    secrets:
      - analysissvc_db_password

  ia-migrate:
    profiles: ["migrations"]
    build:
      dockerfile: Dockerfile
      args:
        SERVICE_PATH: ia-service/cmd/migrate
    image: microservices-go/ia-migrate:prod
    networks:
      - infra-net
    environment:
      IA_DB_HOST: postgres
      IA_DB_PORT: "5432"
      IA_DB_USER: iasvc
      IA_DB_NAME: iasvc
      IA_DB_SSLMODE: disable
      IA_DB_PASSWORD_FILE: /run/secrets/iasvc_db_password
    secrets:
      - iasvc_db_password
 
  notification-migrate:
    profiles: ["migrations"]
    build:
      dockerfile: Dockerfile
      args:
        SERVICE_PATH: notification-service/cmd/migrate
    image: microservices-go/notification-migrate:prod
    networks:
      - infra-net
    environment:
      NOTIFICATION_DB_HOST: postgres
      NOTIFICATION_DB_PORT: "5432"
      NOTIFICATION_DB_USER: notifsvc
      NOTIFICATION_DB_NAME: notifsvc
      NOTIFICATION_DB_SSLMODE: disable
      NOTIFICATION_DB_PASSWORD_FILE: /run/secrets/notifsvc_db_password
    secrets:
      - notifsvc_db_password
 
  loki:
    profiles: ["monitoring"]
    image: grafana/loki:3.0.0
    restart: unless-stopped
    networks:
      - monitoring-net
    command: ["-config.file=/etc/loki/config.yaml"]
    volumes:
      - ./deployments/loki/loki-config.yaml:/etc/loki/config.yaml:ro
      - loki-data:/loki
    ports:
      - "127.0.0.1:60002:3100"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
 
  promtail:
    profiles: ["monitoring"]
    image: grafana/promtail:3.0.0
    restart: unless-stopped
    networks:
      - monitoring-net
    command: ["-config.file=/etc/promtail/config.yaml"]
    volumes:
      - ./deployments/loki/promtail-config.yaml:/etc/promtail/config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail-positions:/tmp
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
 
  grafana:
    profiles: ["monitoring"]
    image: grafana/grafana:11.0.0
    restart: unless-stopped
    networks:
      - monitoring-net
    environment:
      GF_SECURITY_ADMIN_USER_FILE: /run/secrets/grafana_admin_user
      GF_SECURITY_ADMIN_PASSWORD_FILE: /run/secrets/grafana_admin_password
      GF_SECURITY_DISABLE_GRAVATAR: "true"
      GF_SECURITY_COOKIE_SECURE: "true"
      GF_USERS_ALLOW_SIGN_UP: "false"
    secrets:
      - grafana_admin_user
      - grafana_admin_password
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deployments/loki/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "127.0.0.1:60000:3000"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
 
  prometheus:
    profiles: ["monitoring"]
    image: prom/prometheus:v3.3.1
    restart: unless-stopped
    networks:
      - monitoring-net
      - backend-net
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.listen-address=127.0.0.1:9090"
    volumes:
      - ./deployments/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:60001:9090"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
 
  redis:
    profiles: ["backend", "infra"]
    image: redis:8.4.0-alpine
    restart: unless-stopped
    networks:
      - infra-net
    command:
      - "sh"
      - "-ec"
      - >
        exec redis-server
        --appendonly yes
        --requirepass "$$(cat /run/secrets/redis_password)"
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
    secrets:
      - redis_password
    # Port non exposé publiquement — accessible uniquement via le réseau infra-net
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a \"$$(cat /run/secrets/redis_password)\" ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 640M
          cpus: '0.5'
 
  rabbitmq:
    profiles: ["backend", "infra"]
    image: rabbitmq:4.2.3-management-alpine
    restart: unless-stopped
    networks:
      - infra-net
    ports:
      # Management UI restreint au loopback uniquement
      - "127.0.0.1:15672:15672"
    volumes:
      - ./deployments/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./deployments/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
 
  postgres:
    profiles: ["backend", "infra", "migrations"]
    image: postgres:18.1-alpine
    restart: unless-stopped
    networks:
      - infra-net
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_superuser_password
      POSTGRES_DB: postgres
    secrets:
      - postgres_superuser_password
    volumes:
      - ./deployments/postgres/init-multiple-databases.sql:/docker-entrypoint-initdb.d/init-multiple-databases.sql:ro
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # Port non exposé publiquement — accessible uniquement via le réseau infra-net
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
 
  postgres-backup-r2:
    profiles: ["backup"]
    image: postgres:18.1-alpine
    restart: unless-stopped
    networks:
      - infra-net
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["sh", "/opt/backups/postgres-r2-backup.sh"]
    environment:
      BACKUP_POSTGRES_HOST: postgres
      BACKUP_POSTGRES_PORT: "5432"
      BACKUP_POSTGRES_USER: postgres
      BACKUP_POSTGRES_PASSWORD_FILE: /run/secrets/postgres_superuser_password
      BACKUP_INTERVAL_SECONDS: "86400"
      R2_BUCKET_FILE: /run/secrets/r2_bucket
      R2_PREFIX: postgres
      R2_REGION: auto
      R2_ACCOUNT_ID_FILE: /run/secrets/r2_account_id
      R2_ACCESS_KEY_ID_FILE: /run/secrets/r2_access_key_id
      R2_SECRET_ACCESS_KEY_FILE: /run/secrets/r2_secret_access_key
    secrets:
      - postgres_superuser_password
      - r2_bucket
      - r2_account_id
      - r2_access_key_id
      - r2_secret_access_key
    volumes:
      - ./deployments/backups/postgres-r2-backup.sh:/opt/backups/postgres-r2-backup.sh:ro
 
  kratos-migrate:
    profiles: ["migrations"]
    image: oryd/kratos:v25.4.0
    entrypoint: ["sh", "/etc/config/kratos/migrate.sh"]
    networks:
      - infra-net
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      KRATOS_DB_HOST: postgres
      KRATOS_DB_PORT: "5432"
      KRATOS_DB_USER: kratos
      KRATOS_DB_NAME: kratos
      KRATOS_DB_SSLMODE: disable
      KRATOS_DB_PASSWORD_FILE: /run/secrets/kratos_db_password
      KRATOS_PUBLIC_BASE_URL: http://localhost:35433
      WEB_PUBLIC_URL: http://localhost:30000
      APP_PUBLIC_URL: http://localhost:30004
      DOC_PUBLIC_URL: http://localhost:30001
      WEB_AUTH_URL: http://localhost:30000/auth
    secrets:
      - kratos_db_password
      - resend_smtp_connection_uri
      - google_oidc_client_id
      - google_oidc_client_secret
    volumes:
      - ./deployments/kratos:/etc/config/kratos:ro
 
  kratos:
    profiles: ["backend", "infra"]
    image: oryd/kratos:v25.4.0
    restart: unless-stopped
    networks:
      - backend-net
      - infra-net
    entrypoint: ["sh", "/etc/config/kratos/start.sh"]
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      KRATOS_DB_HOST: postgres
      KRATOS_DB_PORT: "5432"
      KRATOS_DB_USER: kratos
      KRATOS_DB_NAME: kratos
      KRATOS_DB_SSLMODE: disable
      KRATOS_DB_PASSWORD_FILE: /run/secrets/kratos_db_password
      KRATOS_PUBLIC_BASE_URL: http://localhost:35433
      WEB_PUBLIC_URL: http://localhost:30000
      APP_PUBLIC_URL: http://localhost:30004
      DOC_PUBLIC_URL: http://localhost:30001
      WEB_AUTH_URL: http://localhost:30000/auth
    secrets:
      - kratos_db_password
      - resend_smtp_connection_uri
      - google_oidc_client_id
      - google_oidc_client_secret
    volumes:
      - ./deployments/kratos:/etc/config/kratos:ro
    ports:
      - "127.0.0.1:35433:4433"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:4433/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  postgres-bootstrap:
    profiles: ["backend", "infra", "migrations"]
    image: postgres:18.1-alpine
    restart: "no"
    networks:
      - infra-net
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_superuser_password
      POSTGRES_COMPOSE_FILE: /workspace/docker-compose.yml
    secrets:
      - postgres_superuser_password
    volumes:
      - ./scripts/postgres/bootstrap-databases.sh:/opt/postgres/bootstrap-databases.sh:ro
      - ./docker-compose.yml:/workspace/docker-compose.yml:ro
    entrypoint: ["sh", "/opt/postgres/bootstrap-databases.sh"]
 
volumes:
  redis-data:
  rabbitmq-data:
  postgres-data:
  loki-data:
  promtail-positions:
  grafana-data:
  prometheus-data:
 
# Secrets are defined in docker-compose.secrets.generated.yml.
