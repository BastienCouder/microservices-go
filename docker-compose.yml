      NOTIFICATION_DB_NAME: notifsvc
      NOTIFICATION_DB_SSLMODE: disable
      NOTIFICATION_DB_PASSWORD_FILE: /run/secrets/notifsvc_db_password
      EMAIL_RENDERER_URL: http://email:3002
      RESEND_API_KEY_FILE: /run/secrets/resend_api_key
      RESEND_FROM_EMAIL_FILE: /run/secrets/resend_from_email
      RABBITMQ_URL_FILE: /run/secrets/rabbitmq_url
      RABBITMQ_EXCHANGE: microservices.events
      RABBITMQ_NOTIFICATION_EMAIL_QUEUE: notification.email.send
      RABBITMQ_NOTIFICATION_EMAIL_ROUTING_KEY: notification.email.requested
      INTERNAL_JWT_SECRET_FILE: /run/secrets/internal_jwt_secret
