networks:
  frontend-net:
  backend-net:
  infra-net:
  monitoring-net:
 
services:
  web:
    profiles: ["frontend"]
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_GATEWAY_URL: http://localhost:50000
        NEXT_PUBLIC_APP_URL: http://localhost:30004
        NEXT_PUBLIC_SITE_URL: http://localhost:30000
        NEXT_PUBLIC_WEB_URL: http://localhost:30000
    image: microservices-go/web:prod
    restart: unless-stopped
    networks:
      - frontend-net
      - backend-net
    environment:
      KRATOS_PUBLIC_PROXY_URL: http://kratos:4433
      NEXT_PUBLIC_API_GATEWAY_URL: http://localhost:50000
      NEXT_PUBLIC_APP_URL: http://localhost:30004
      NEXT_PUBLIC_SITE_URL: http://localhost:30000
      NEXT_PUBLIC_WEB_URL: http://localhost:30000
    ports:
      - "127.0.0.1:30000:3000"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  app:
    profiles: ["frontend"]
    build:
      context: ./apps/app
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:50000
        VITE_WEB_AUTH_URL: http://localhost:30000/auth
    image: microservices-go/app:prod
    restart: unless-stopped
    networks:
      - frontend-net
      - backend-net
    environment:
      API_GATEWAY_INTERNAL_URL: http://api-gateway:8080
      WEB_AUTH_URL: http://localhost:30000/auth
    ports:
      - "127.0.0.1:30004:8080"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
 
  doc:
    profiles: ["doc"]
    build:
      dockerfile: apps/doc/Dockerfile
    image: microservices-go/doc:prod
    restart: unless-stopped
    networks:
      - frontend-net
    ports:
      - "127.0.0.1:30001:3000"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
 
  email:
    profiles: ["email"]
    build:
      dockerfile: apps/email/Dockerfile
    image: microservices-go/email:prod
    restart: unless-stopped
    networks:
      - backend-net
    environment:
      EMAIL_API_PORT: "3002"
    ports:
      - "127.0.0.1:30002:3002"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3002/health || exit 1"]
      interval: 20s
      timeout: 3s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
 
  mcp-server:
    profiles: ["mcp"]
    build:
      dockerfile: Dockerfile
      args:
        SERVICE_PATH: mcp-server/cmd/server
    image: microservices-go/mcp-server:prod
    restart: unless-stopped
    networks:
      - backend-net
    command: ["--transport", "http", "--http-addr", ":8090", "--metrics-addr", ":9090"]
    ports:
      - "127.0.0.1:50010:8090"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
 
  api-gateway:
    profiles: ["backend"]
    build:
      dockerfile: Dockerfile
      args:
        SERVICE_PATH: api-gateway/cmd/api
    image: microservices-go/api-gateway:prod
    restart: unless-stopped
    networks:
      - frontend-net
      - backend-net
    environment:
      HTTP_ADDR: :8080
      METRICS_ADDR: :9090
      HTTP_ADDR_FILE: /run/secrets/gateway_http_addr
      METRICS_ADDR_FILE: /run/secrets/gateway_metrics_addr
      USER_SERVICE_URL: http://user-service:8081
      AUTH_SERVICE_URL: http://auth-service:8083
      ORGANIZATIONS_SERVICE_URL: http://organizations-service:8084
      PERMISSION_SERVICE_URL: http://permission-service:8085
      PERMISSION_SERVICE_GRPC_ADDR: permission-service:9085
      BILLING_SERVICE_URL: http://billing-service:8086
      NOTIFICATION_SERVICE_URL: http://notification-service:8087
      PROJECT_SERVICE_URL: http://project-service:8088
      ANALYSIS_SERVICE_URL: http://analysis-service:8089
      IA_SERVICE_URL: http://ia-service:8091
      ATTRIBUTION_SERVICE_URL: http://attribution-service:8092
      RATE_LIMIT_RPM: "600"
      INTERNAL_JWT_SECRET_FILE: /run/secrets/internal_jwt_secret
      INTERNAL_JWT_ISSUER: api-gateway
      PERMISSION_GRPC_ALLOW_INSECURE: "true"
      CORS_ALLOWED_ORIGINS: http://localhost:30000,http://localhost:30004
    secrets:
      - gateway_http_addr
      - gateway_metrics_addr
      - internal_jwt_secret
    ports:
      - "127.0.0.1:50000:8080"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
 
  auth-service:
    profiles: ["backend"]
    build:
      dockerfile: Dockerfile
      args:
        SERVICE_PATH: auth-service/cmd/api
    image: microservices-go/auth-service:prod
    restart: unless-stopped
    networks:
      - backend-net
    environment:
      HTTP_ADDR: :8083
      METRICS_ADDR: :9090
      KRATOS_PUBLIC_URL: http://kratos:4433
      KRATOS_BROWSER_URL: http://localhost:35433
      USER_SERVICE_URL: http://user-service:8081
      APP_RETURN_URL: http://localhost:30004/
      ALLOWED_ORIGIN: http://localhost:30000
      INTERNAL_JWT_SECRET_FILE: /run/secrets/internal_jwt_secret
      INTERNAL_JWT_ISSUER: api-gateway
    secrets:
      - internal_jwt_secret
    # Port non exposé publiquement — accessible uniquement via api-gateway
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
 
  user-service:
    profiles: ["backend"]
    build:
      dockerfile: Dockerfile
      args:
        SERVICE_PATH: user-service/cmd/api
    image: microservices-go/user-service:prod
    restart: unless-stopped
    networks:
      - backend-net
      - infra-net
    environment:
      HTTP_ADDR: :8081
      METRICS_ADDR: :9090
      USER_DB_HOST: postgres
      USER_DB_PORT: "5432"
      USER_DB_USER: usersvc
      USER_DB_NAME: usersvc
      USER_DB_SSLMODE: disable
      USER_DB_PASSWORD_FILE: /run/secrets/usersvc_db_password
      INTERNAL_JWT_SECRET_FILE: /run/secrets/internal_jwt_secret
      INTERNAL_JWT_ISSUER: api-gateway
    secrets:
      - usersvc_db_password
      - internal_jwt_secret
    # Port non exposé publiquement — accessible uniquement via api-gateway
    healthcheck:
      test: ["CMD", "/app/service", "healthcheck"]
      interval: 20s
      timeout: 3s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
 
  user-migrate:
    profiles: ["migrations"]
    build:
      dockerfile: Dockerfile
      args:
        SERVICE_PATH: user-service/cmd/migrate
    image: microservices-go/user-migrate:prod
    networks:
      - infra-net
    environment:
      USER_DB_HOST: postgres
      USER_DB_PORT: "5432"
      USER_DB_USER: usersvc
      USER_DB_NAME: usersvc
      USER_DB_SSLMODE: disable
      USER_DB_PASSWORD_FILE: /run/secrets/usersvc_db_password
    secrets:
      - usersvc_db_password
 
  organizations-service:
    profiles: ["backend"]
    build:
      dockerfile: Dockerfile
      args:
        SERVICE_PATH: organizations-service/cmd/api
    image: microservices-go/organizations-service:prod
    restart: unless-stopped
    networks:
      - backend-net
      - infra-net
    environment:
      HTTP_ADDR_FILE: /run/secrets/organizations_http_addr
      METRICS_ADDR_FILE: /run/secrets/organizations_metrics_addr
      GRPC_ADDR: :9084
      ORG_DB_HOST_FILE: /run/secrets/db_host
      ORG_DB_PORT_FILE: /run/secrets/db_port
      ORG_DB_USER_FILE: /run/secrets/organizations_db_user
      ORG_DB_NAME_FILE: /run/secrets/organizations_db_name
      ORG_DB_SSLMODE_FILE: /run/secrets/db_sslmode
      ORG_DB_PASSWORD_FILE: /run/secrets/orgsvc_db_password
      USER_SERVICE_URL: http://user-service:8081
      PROJECT_SERVICE_URL: http://project-service:8088
      APP_BASE_URL: http://localhost:30004
      INVITATION_LOGIN_URL: http://localhost:30000/auth
      RABBITMQ_URL_FILE: /run/secrets/rabbitmq_url
      RABBITMQ_EXCHANGE: microservices.events
      RABBITMQ_NOTIFICATION_EMAIL_QUEUE: notification.email.send
      RABBITMQ_NOTIFICATION_EMAIL_ROUTING_KEY: notification.email.requested
      INTERNAL_JWT_SECRET_FILE: /run/secrets/internal_jwt_secret
      INTERNAL_JWT_ISSUER: api-gateway
      GRPC_ALLOW_INSECURE: "true"
    secrets:
      - organizations_http_addr
      - organizations_metrics_addr
      - db_host
      - db_port
      - organizations_db_user
      - organizations_db_name
      - db_sslmode
      - orgsvc_db_password
      - internal_jwt_secret
      - rabbitmq_url
    # Port non exposé publiquement — accessible uniquement via api-gateway
    healthcheck:
      test: ["CMD", "/app/service", "healthcheck"]
      interval: 20s
      timeout: 3s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    logging:
