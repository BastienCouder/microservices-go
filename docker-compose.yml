    image: microservices-go/project-service:prod
    restart: unless-stopped
    networks:
      - backend-net
      - infra-net
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      HTTP_ADDR: :8088
      METRICS_ADDR: :9090
      GRPC_ADDR: :9088
      PROJECT_DB_HOST: postgres
      PROJECT_DB_PORT: "5432"
      PROJECT_DB_USER: projectsvc
      PROJECT_DB_NAME: projectsvc
      PROJECT_DB_SSLMODE: disable
      PROJECT_DB_PASSWORD_FILE: /run/secrets/projectsvc_db_password
