syntax = "proto3";

package permission.v1;

option go_package = "github.com/bastiencouder/microservices-go/contracts/gen/go/permission/v1;permissionv1";

service PermissionService {
  rpc Check(CheckRequest) returns (CheckResponse);
}

message CheckRequest {
  int64 organization_id = 1;
  int64 user_id = 2;
  string action = 3;
  string resource = 4;
}

message CheckResponse {
  bool allowed = 1;
  string reason = 2;
}
