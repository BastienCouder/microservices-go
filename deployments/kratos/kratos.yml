version: v25.4.0

dsn: ${DSN}

serve:
  public:
    base_url: http://localhost:4433/
    cors:
      enabled: true
      allowed_origins:
        - http://localhost:30000
        - http://localhost:30004
        - http://localhost:30001
      allowed_methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
      allowed_headers:
        - Authorization
        - Cookie
        - Content-Type
        - X-Session-Token
      exposed_headers:
        - Content-Type
        - Set-Cookie
  admin:
    base_url: http://localhost:4434/

selfservice:
  default_browser_return_url: http://localhost:30004/
  allowed_return_urls:
    - http://localhost:30004/
    - http://localhost:30000/
    - http://localhost:30000/auth
    - http://localhost:30000/auth/login
    - http://localhost:30000/auth/register

  methods:
    password:
      enabled: true
    code:
      enabled: true
      passwordless_enabled: true
    oidc:
      enabled: true
      config:
        providers:
          - id: google
            provider: google
            client_id: ${KRATOS_OIDC_GOOGLE_CLIENT_ID}
            client_secret: ${KRATOS_OIDC_GOOGLE_CLIENT_SECRET}
            mapper_url: file:///etc/config/kratos/google.jsonnet
            scope:
              - openid
              - profile
              - email

  flows:
    error:
      ui_url: http://localhost:30000/auth/error
    settings:
      ui_url: http://localhost:30000/auth/settings
      privileged_session_max_age: 15m
    recovery:
      enabled: false
      ui_url: http://localhost:30000/auth/recovery
    verification:
      enabled: false
      ui_url: http://localhost:30000/auth/verification
      after:
        default_browser_return_url: http://localhost:30000/
    logout:
      after:
        default_browser_return_url: http://localhost:30000/auth/login
    login:
      ui_url: http://localhost:30000/auth/login
      after:
        default_browser_return_url: http://localhost:30004/
    registration:
      ui_url: http://localhost:30000/auth/register
      after:
        default_browser_return_url: http://localhost:30004/
        password:
          hooks:
            - hook: session
        oidc:
          hooks:
            - hook: session

log:
  level: info
  format: text

courier:
  smtp:
    connection_uri: smtp://mailhog:1025/?skip_ssl_verify=true

secrets:
  cookie:
    - 0123456789abcdef0123456789abcdef
  cipher:
    - abcdef0123456789abcdef0123456789

ciphers:
  algorithm: xchacha20-poly1305

identity:
  default_schema_id: default
  schemas:
    - id: default
      url: file:///etc/config/kratos/identity.schema.json
