version: v25.4.0

dsn: ${DSN}

serve:
  public:
    base_url: ${KRATOS_PUBLIC_BASE_URL}
    cors:
      enabled: true
      allowed_origins: ${KRATOS_ALLOWED_ORIGINS}
      allowed_methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
      allowed_headers:
        - Authorization
        - Cookie
        - Content-Type
        - X-Session-Token
      exposed_headers:
        - Content-Type
        - Set-Cookie
  admin:
    base_url: http://localhost:4434/

selfservice:
  default_browser_return_url: ${KRATOS_DEFAULT_BROWSER_RETURN_URL}
  allowed_return_urls: ${KRATOS_ALLOWED_RETURN_URLS}

  methods:
    password:
      enabled: true
    code:
      enabled: true
      passwordless_enabled: true
    oidc:
      enabled: true
      config:
        providers:
          - id: google
            provider: google
            client_id: ${KRATOS_OIDC_GOOGLE_CLIENT_ID}
            client_secret: ${KRATOS_OIDC_GOOGLE_CLIENT_SECRET}
            mapper_url: file:///etc/config/kratos/google.jsonnet
            scope:
              - openid
              - profile
              - email

  flows:
    error:
      ui_url: ${KRATOS_ERROR_UI_URL}
    settings:
      ui_url: ${KRATOS_SETTINGS_UI_URL}
      privileged_session_max_age: 15m
    recovery:
      enabled: false
      ui_url: ${KRATOS_RECOVERY_UI_URL}
    verification:
      enabled: false
      ui_url: ${KRATOS_VERIFICATION_UI_URL}
      after:
        default_browser_return_url: ${KRATOS_VERIFICATION_RETURN_URL}
    logout:
      after:
        default_browser_return_url: ${KRATOS_LOGOUT_RETURN_URL}
    login:
      ui_url: ${KRATOS_LOGIN_UI_URL}
      after:
        default_browser_return_url: ${KRATOS_LOGIN_RETURN_URL}
    registration:
      ui_url: ${KRATOS_REGISTRATION_UI_URL}
      after:
        default_browser_return_url: ${KRATOS_REGISTRATION_RETURN_URL}
        password:
          hooks:
            - hook: session
        oidc:
          hooks:
            - hook: session

log:
  level: info
  format: text

courier:
  template_override_path: /etc/config/kratos/courier
  smtp:
    connection_uri: smtp://mailhog:1025/?skip_ssl_verify=true

secrets:
  cookie:
    - 0123456789abcdef0123456789abcdef
  cipher:
    - abcdef0123456789abcdef0123456789

session:
  cookie:
    domain: ${KRATOS_COOKIE_DOMAIN}

ciphers:
  algorithm: xchacha20-poly1305

identity:
  default_schema_id: default
  schemas:
    - id: default
      url: file:///etc/config/kratos/identity.schema.json
