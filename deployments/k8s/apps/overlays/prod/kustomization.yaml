apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: msgo-apps
resources:
  - ../../base
  - ingress.yaml
  - networkpolicy-default-deny.yaml
  - networkpolicy-allow-dns.yaml
  - networkpolicy-allow-infra-egress.yaml
  - networkpolicy-allow-ingress-nginx.yaml
  - api-gateway-pdb.yaml
  - api-gateway-hpa.yaml
  - auth-service-hpa.yaml
  - servicemonitors.yaml
configMapGenerator:
  - name: api-gateway-config
    literals:
      - HTTP_ADDR=:8080
      - USER_SERVICE_URL=http://user-service:8081
      - AUTH_SERVICE_URL=http://auth-service:8083
      - ORGANIZATIONS_SERVICE_URL=http://organizations-service:8084
      - PERMISSION_SERVICE_URL=http://permission-service:8085
      - PERMISSION_SERVICE_GRPC_ADDR=permission-service:9085
      - BILLING_SERVICE_URL=http://billing-service:8086
      - NOTIFICATION_SERVICE_URL=http://notification-service:8087
      - RATE_LIMIT_RPM=120
      - INTERNAL_JWT_ISSUER=api-gateway
      - CORS_ALLOWED_ORIGINS=https://web.example.com,https://app.example.com
  - name: auth-service-config
    literals:
      - HTTP_ADDR=:8083
      - KRATOS_PUBLIC_URL=http://kratos-public:4433
      - KRATOS_BROWSER_URL=https://kratos.example.com
      - ALLOWED_ORIGIN=https://web.example.com
      - INTERNAL_JWT_ISSUER=api-gateway
  - name: user-service-config
    literals:
      - HTTP_ADDR=:8081
      - USER_DB_HOST=postgresql.msgo-infra.svc.cluster.local
      - USER_DB_PORT=5432
      - USER_DB_USER=usersvc
      - USER_DB_NAME=usersvc
      - USER_DB_SSLMODE=disable
      - USER_DB_PASSWORD_FILE=/run/secrets/usersvc_db_password
      - INTERNAL_JWT_ISSUER=api-gateway
  - name: organizations-service-config
    literals:
      - HTTP_ADDR=:8084
      - ORG_DB_HOST=postgresql.msgo-infra.svc.cluster.local
      - ORG_DB_PORT=5432
      - ORG_DB_USER=orgsvc
      - ORG_DB_NAME=orgsvc
      - ORG_DB_SSLMODE=disable
      - ORG_DB_PASSWORD_FILE=/run/secrets/orgsvc_db_password
      - INTERNAL_JWT_ISSUER=api-gateway
  - name: permission-service-config
    literals:
      - HTTP_ADDR=:8085
      - GRPC_ADDR=:9085
      - PERMISSION_DB_HOST=postgresql.msgo-infra.svc.cluster.local
      - PERMISSION_DB_PORT=5432
      - PERMISSION_DB_USER=permsvc
      - PERMISSION_DB_NAME=permsvc
      - PERMISSION_DB_SSLMODE=disable
      - PERMISSION_DB_PASSWORD_FILE=/run/secrets/permsvc_db_password
      - ORGANIZATIONS_SERVICE_URL=http://organizations-service:8084
      - INTERNAL_JWT_ISSUER=api-gateway
  - name: billing-service-config
    literals:
      - HTTP_ADDR=:8086
      - BILLING_DB_HOST=postgresql.msgo-infra.svc.cluster.local
      - BILLING_DB_PORT=5432
      - BILLING_DB_USER=billsvc
      - BILLING_DB_NAME=billsvc
      - BILLING_DB_SSLMODE=disable
      - BILLING_DB_PASSWORD_FILE=/run/secrets/billsvc_db_password
      - INTERNAL_JWT_ISSUER=api-gateway
  - name: notification-service-config
    literals:
      - HTTP_ADDR=:8087
      - NOTIFICATION_DB_HOST=postgresql.msgo-infra.svc.cluster.local
      - NOTIFICATION_DB_PORT=5432
      - NOTIFICATION_DB_USER=notifsvc
      - NOTIFICATION_DB_NAME=notifsvc
      - NOTIFICATION_DB_SSLMODE=disable
      - NOTIFICATION_DB_PASSWORD_FILE=/run/secrets/notifsvc_db_password
      - EMAIL_RENDERER_URL=http://email:3002
      - RESEND_API_KEY_FILE=/run/secrets/resend_api_key
      - RESEND_FROM_EMAIL=noreply@example.com
      - INTERNAL_JWT_ISSUER=api-gateway
  - name: web-config
    literals:
      - NEXT_PUBLIC_API_GATEWAY_URL=https://api.example.com
      - NEXT_PUBLIC_APP_URL=https://app.example.com
  - name: app-config
    literals:
      - VITE_API_BASE_URL=https://api.example.com
      - VITE_WEB_AUTH_URL=https://web.example.com/auth
  - name: doc-config
    literals:
      - NODE_ENV=production
  - name: email-config
    literals:
      - EMAIL_API_PORT=3002
  - name: kratos-config
    literals:
      - KRATOS_DB_HOST=postgresql.msgo-infra.svc.cluster.local
      - KRATOS_DB_PORT=5432
      - KRATOS_DB_USER=kratos
      - KRATOS_DB_NAME=kratos
      - KRATOS_DB_SSLMODE=disable
secretGenerator:
  - name: app-secrets
    files:
      - secrets/postgres_superuser_password
      - secrets/usersvc_db_password
      - secrets/orgsvc_db_password
      - secrets/permsvc_db_password
      - secrets/billsvc_db_password
      - secrets/notifsvc_db_password
      - secrets/kratos_db_password
      - secrets/google_oidc_client_id
      - secrets/google_oidc_client_secret
      - secrets/resend_api_key
      - secrets/resend_smtp_connection_uri
      - secrets/internal_jwt_secret
      - secrets/kratos_cookie_secret
      - secrets/kratos_cipher_secret
  - name: kratos-config-secret
    files:
      - config/kratos/kratos.yml
      - config/kratos/identity.schema.json
      - config/kratos/google.jsonnet
      - config/kratos/start.sh
      - config/kratos/migrate.sh
generatorOptions:
  disableNameSuffixHash: true
