version: v25.4.0

dsn: ${DSN}

serve:
  public:
    base_url: https://kratos.example.com/
    cors:
      enabled: true
      allowed_origins:
        - https://web.example.com
        - https://app.example.com
      allowed_methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
      allowed_headers:
        - Authorization
        - Cookie
        - Content-Type
        - X-Session-Token
      exposed_headers:
        - Content-Type
        - Set-Cookie
  admin:
    base_url: http://kratos-admin:4434/

selfservice:
  default_browser_return_url: https://web.example.com/

  methods:
    password:
      enabled: true
    code:
      enabled: true
      passwordless_enabled: true
    oidc:
      enabled: true
      config:
        providers:
          - id: google
            provider: google
            client_id: ${KRATOS_OIDC_GOOGLE_CLIENT_ID}
            client_secret: ${KRATOS_OIDC_GOOGLE_CLIENT_SECRET}
            mapper_url: file:///etc/config/kratos/google.jsonnet
            scope:
              - openid
              - profile
              - email

  flows:
    error:
      ui_url: https://web.example.com/auth/error
    settings:
      ui_url: https://web.example.com/auth/settings
      privileged_session_max_age: 15m
    recovery:
      enabled: false
      ui_url: https://web.example.com/auth/recovery
    verification:
      enabled: false
      ui_url: https://web.example.com/auth/verification
      after:
        default_browser_return_url: https://web.example.com/
    logout:
      after:
        default_browser_return_url: https://web.example.com/auth/login
    login:
      ui_url: https://web.example.com/auth/login
    registration:
      ui_url: https://web.example.com/auth/register
      after:
        password:
          hooks:
            - hook: session

log:
  level: info
  format: text

courier:
  smtp:
    connection_uri: ${KRATOS_SMTP_CONNECTION_URI}

secrets:
  cookie:
    - ${KRATOS_COOKIE_SECRET}
  cipher:
    - ${KRATOS_CIPHER_SECRET}

ciphers:
  algorithm: xchacha20-poly1305

identity:
  default_schema_id: default
  schemas:
    - id: default
      url: file:///etc/config/kratos/identity.schema.json
