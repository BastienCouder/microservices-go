apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  labels:
    app: notification-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      serviceAccountName: notification-service
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: app-secrets
          secret:
            secretName: app-secrets
      containers:
        - name: notification-service
          image: microservices-go/notification-service:prod
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8087
              name: http
          env:
            - name: INTERNAL_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: internal_jwt_secret
          envFrom:
            - configMapRef:
                name: notification-service-config
          volumeMounts:
            - name: app-secrets
              mountPath: /run/secrets
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            exec:
              command: ["/app/service", "healthcheck"]
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["/app/service", "healthcheck"]
            initialDelaySeconds: 30
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
