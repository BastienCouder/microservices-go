apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: msgo-infra
resources:
  - postgres-bootstrap-job.yaml
configMapGenerator:
  - name: postgres-bootstrap-script
    files:
      - postgres-bootstrap.sh
secretGenerator:
  - name: infra-secrets
    files:
      - ../../apps/overlays/prod/secrets/postgres_superuser_password
      - ../../apps/overlays/prod/secrets/usersvc_db_password
      - ../../apps/overlays/prod/secrets/orgsvc_db_password
      - ../../apps/overlays/prod/secrets/permsvc_db_password
      - ../../apps/overlays/prod/secrets/billsvc_db_password
      - ../../apps/overlays/prod/secrets/notifsvc_db_password
      - ../../apps/overlays/prod/secrets/kratos_db_password
      - ../../apps/overlays/prod/secrets/rabbitmq_password
      - ../../apps/overlays/prod/secrets/redis_password
generatorOptions:
  disableNameSuffixHash: true
