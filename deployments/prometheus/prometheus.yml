global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: microservices-go

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: api-gateway
    metrics_path: /metrics
    static_configs:
      - targets: ["api-gateway:9090"]

  - job_name: auth-service
    metrics_path: /metrics
    static_configs:
      - targets: ["auth-service:9090"]

  - job_name: user-service
    metrics_path: /metrics
    static_configs:
      - targets: ["user-service:9090"]

  - job_name: organizations-service
    metrics_path: /metrics
    static_configs:
      - targets: ["organizations-service:9090"]

  - job_name: permission-service
    metrics_path: /metrics
    static_configs:
      - targets: ["permission-service:9090"]

  - job_name: billing-service
    metrics_path: /metrics
    static_configs:
      - targets: ["billing-service:9090"]

  - job_name: notification-service
    metrics_path: /metrics
    static_configs:
      - targets: ["notification-service:9090"]

  - job_name: mcp-server
    metrics_path: /metrics
    static_configs:
      - targets: ["mcp-server:9090"]
