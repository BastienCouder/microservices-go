services:
  web:
    build:
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5173
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://127.0.0.1:19000}
      INTERNAL_API_URL: ${INTERNAL_API_URL:-http://127.0.0.1:19000}
      NEXT_PUBLIC_AUTH_URL: ${NEXT_PUBLIC_AUTH_URL:-http://127.0.0.1:19000}
      NEXT_PUBLIC_AUTH_BASE_PATH: ${NEXT_PUBLIC_AUTH_BASE_PATH:-/auth}
      AUTH_JWKS_URL: ${AUTH_JWKS_URL:-http://127.0.0.1:19002/auth/jwks}
      ISSUER: ${ISSUER:-auth-service}
      AUDIENCE: ${AUDIENCE:-web}
    ports:
      - 20000:80
