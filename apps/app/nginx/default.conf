server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  resolver 127.0.0.11 ipv6=off valid=10s;
  set $api_gateway ${API_GATEWAY_INTERNAL_URL};

  location = /_auth_check {
    internal;
    proxy_pass $api_gateway/auth/me;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";
    proxy_set_header Cookie $http_cookie;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header X-Original-URI $request_uri;
    proxy_intercept_errors on;
    error_page 400 401 403 404 429 500 502 503 504 = @auth_unauthorized;
  }

  location @auth_unauthorized {
    internal;
    return 401;
  }

  location @auth_redirect {
    return 302 ${WEB_AUTH_URL}?return_to=$scheme://$http_host$request_uri;
  }

  error_page 401 = @auth_redirect;

  location / {
    auth_request /_auth_check;
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(?:css|js|mjs|json|png|jpg|jpeg|gif|svg|ico|webp|avif|woff2?|ttf|eot)$ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }
}
