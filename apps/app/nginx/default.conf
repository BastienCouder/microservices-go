server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  resolver 127.0.0.11 ipv6=off valid=10s;
  set $api_gateway ${API_GATEWAY_INTERNAL_URL};
  set $app_public_url ${APP_PUBLIC_URL};

  location = /_auth_check {
    internal;
    proxy_pass $api_gateway/auth/app-entry;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";
    proxy_set_header Cookie $http_cookie;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header X-Original-URI $request_uri;
  }

  location @auth_unauthorized {
    internal;
    return 401;
  }

  location @app_entry_forbidden {
    internal;
    if ($app_redirect != "") {
      return 302 $app_public_url$app_redirect;
    }
    return 403;
  }

  location @auth_unavailable {
    internal;
    return 503;
  }

  location @auth_redirect {
    return 302 ${WEB_AUTH_URL}?return_to=$app_public_url$request_uri;
  }

  error_page 401 = @auth_redirect;
  error_page 403 = @app_entry_forbidden;
  error_page 500 502 503 504 = @auth_unavailable;

  location / {
    auth_request /_auth_check;
    auth_request_set $app_redirect $upstream_http_x_app_redirect;
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(?:css|js|mjs|json|png|jpg|jpeg|gif|svg|ico|webp|avif|woff2?|ttf|eot)$ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }
}
