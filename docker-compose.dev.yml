services:
  web:
    build:
      target: dev
    image: microservices-go/web:dev
    pull_policy: never
    command: ["sh", "-c", "bun install --frozen-lockfile && bun run dev --hostname 0.0.0.0 --port 3000"]
    volumes:
      - ./apps/web:/app
      - web-node_modules:/app/node_modules
    ports:
      - "30000:3000"

  app:
    build:
      target: dev
    image: microservices-go/app:dev
    pull_policy: never
    command: ["sh", "-c", "bun install --frozen-lockfile && bun run dev --host 0.0.0.0 --port 5173"]
    volumes:
      - ./apps/app:/app
      - app-node_modules:/app/node_modules
    ports:
      - "30004:5173"

  doc:
    build:
      target: dev
    image: microservices-go/doc:dev
    pull_policy: never
    command: ["sh", "-c", "bun install && bun run dev --hostname 0.0.0.0 --port 3001"]
    volumes:
      - ./apps/doc:/app
      - doc-node_modules:/app/node_modules
    ports:
      - "30001:3001"

  email:
    build:
      target: dev
    image: microservices-go/email:dev
    pull_policy: never
    command: ["sh", "-c", "bun install && bun run api"]
    volumes:
      - ./apps/email:/app
      - email-node_modules:/app/node_modules

  api-gateway:
    build:
      target: dev
    image: microservices-go/api-gateway:dev
    pull_policy: never
    working_dir: /workspace/services/api-gateway
    command: ["air", "-c", ".air.toml"]
    volumes:
      - ./:/workspace
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build

  auth-service:
    build:
      target: dev
    image: microservices-go/auth-service:dev
    pull_policy: never
    working_dir: /workspace/services/auth-service
