syntax = "proto3";

package ia.v1;

option go_package = "github.com/bastiencouder/microservices-go/contracts/gen/go/ia/v1;iav1";

service IAService {
  rpc ExecutePrompt(ExecutePromptRequest) returns (ExecutePromptResponse);
  rpc ListModels(ListModelsRequest) returns (ListModelsResponse);
}

message ExecutePromptRequest {
  string prompt_id = 1;
  string prompt_text = 2;
  string model_id = 3;
  string brand_name = 4;
  repeated string competitors = 5;
  string provider_id = 6;
  string provider_api_key = 7;
  string prompt_mode = 8;
}

message PromptExecutionAnalysis {
  bool brand_mentioned = 1;
  string brand_position = 2;
  bool citation_found = 3;
  repeated string cited_urls = 4;
  string sentiment = 5;
}

message ExecutePromptResponse {
  string raw_response = 1;
  PromptExecutionAnalysis analysis = 2;
  int32 tokens_used = 3;
  int32 latency_ms = 4;
}

message ListModelsRequest {
  bool active_only = 1;
}

message AIModel {
  string id = 1;
  string display_name = 2;
  string provider = 3;
  string group_name = 4;
  string icon_key = 5;
  string provider_model_id = 6;
  bool is_active = 7;
  bool supports_live_search = 8;
  string source = 9;
  int32 credit_cost = 10;
}

message ListModelsResponse {
  repeated AIModel models = 1;
}
