syntax = "proto3";

package organizations.v1;

option go_package = "github.com/bastiencouder/microservices-go/contracts/gen/go/organizations/v1;organizationsv1";

service OrganizationsService {
  rpc ListProjectMembersByUser(ListProjectMembersByUserRequest) returns (ListProjectMembersByUserResponse);
}

message ListProjectMembersByUserRequest {}

message ProjectMember {
  string project_id = 1;
  int64 organization_id = 2;
  int64 user_id = 3;
  string role = 4;
  string added_at = 5;
}

message ListProjectMembersByUserResponse {
  repeated ProjectMember members = 1;
}
