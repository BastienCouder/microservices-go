---
- name: Deploy visia
  hosts: production
  become: true
  gather_facts: false
  vars:
    compose_files:
      - "{{ deploy_path }}/docker-compose.yml"
      - "{{ deploy_path }}/docker-compose.secrets.generated.yml"
    certbot_domains: "{{ app_all_domains | default(app_domains) }}"
    initial_clone_path: "/tmp/{{ app_name }}-initial-clone"
    repo_deploy_private_key: ""
    repo_deploy_private_key_file: ""
    effective_repo_deploy_private_key: "{{ lookup('file', repo_deploy_private_key_file) if (repo_deploy_private_key_file | length > 0) else repo_deploy_private_key }}"
    repo_deploy_key_path: "/home/{{ deploy_user }}/.ssh/github_deploy_key"
    postgres_role_password_files:
      usersvc: usersvc_db_password.txt
      orgsvc: orgsvc_db_password.txt
      permsvc: permsvc_db_password.txt
      billsvc: billsvc_db_password.txt
      notifsvc: notifsvc_db_password.txt
      projectsvc: projectsvc_db_password.txt
      analysissvc: analysissvc_db_password.txt
      iasvc: iasvc_db_password.txt
      kratos: kratos_db_password.txt
    migration_services:
      - kratos-migrate
      - user-migrate
      - organizations-migrate
      - permission-migrate
      - billing-migrate
      - project-migrate
      - analysis-migrate
      - ia-migrate
      - notification-migrate
    compose_profiles_default:
      - frontend
      - backend
      - infra
    deploy_services: []
    deploy_profiles: "{{ [] if (deploy_services | length > 0) else compose_profiles_default }}"
    deploy_build: true
    deploy_detached: true
    deploy_run_migrations: true
    deploy_run_certbot: false
  vars_files:
    - ../group_vars/production.yml
    - ../group_vars/generated_secrets.yml
  tasks:
    - name: Ensure deploy parent directory exists
      ansible.builtin.file:
        path: "{{ deploy_path | dirname }}"
        state: directory
        mode: "0755"

    - name: Check repository state
      ansible.builtin.stat:
        path: "{{ deploy_path }}/.git"
      register: deploy_git_dir

    - name: Ensure deploy user SSH directory exists
      ansible.builtin.file:
        path: "/home/{{ deploy_user }}/.ssh"
        state: directory
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: "0700"

    - name: Check existing GitHub deploy key on server
      ansible.builtin.stat:
        path: "{{ repo_deploy_key_path }}"
      register: existing_repo_deploy_key

    - name: Stop deploy if GitHub SSH deploy key is missing
      ansible.builtin.fail:
        msg: "repo_url uses git@github.com, but no deploy key was provided and {{ repo_deploy_key_path }} does not exist. Either configure GitHub Actions secret PRODUCTION_GITHUB_DEPLOY_KEY_B64 or create the key on the server for user {{ deploy_user }}."
      when:
        - repo_url is search('git@github.com')
        - effective_repo_deploy_private_key | length == 0
        - not existing_repo_deploy_key.stat.exists

    - name: Install GitHub deploy key
      ansible.builtin.copy:
        content: "{{ effective_repo_deploy_private_key }}"
        dest: "{{ repo_deploy_key_path }}"
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: "0600"
      when: effective_repo_deploy_private_key | length > 0
      no_log: true

    - name: Validate GitHub deploy key on server
      ansible.builtin.command:
        argv:
          - sudo
          - -u
          - "{{ deploy_user }}"
          - ssh-keygen
          - -y
          - -f
          - "{{ repo_deploy_key_path }}"
      changed_when: false
      when:
        - repo_url is search('git@github.com')
        - effective_repo_deploy_private_key | length > 0 or existing_repo_deploy_key.stat.exists

    - name: Configure GitHub SSH identity for deploy user
      ansible.builtin.blockinfile:
        path: "/home/{{ deploy_user }}/.ssh/config"
        create: true
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: "0600"
        marker: "# {mark} ANSIBLE MANAGED GITHUB DEPLOY KEY"
        block: |
          Host github.com
            HostName github.com
            User git
            IdentityFile {{ repo_deploy_key_path }}
            IdentitiesOnly yes
      when:
        - repo_url is search('git@github.com')
        - effective_repo_deploy_private_key | length > 0 or existing_repo_deploy_key.stat.exists

    - name: Trust GitHub host key for deploy user
      ansible.builtin.known_hosts:
        path: "/home/{{ deploy_user }}/.ssh/known_hosts"
        name: github.com
        key: "github.com ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIOMqQ7VJ8AnrK+HfNqjUCbEOv17l0D3/VvI5E8Q+Kve"
        state: present
      when: repo_url is search('git@github.com')

    - name: Ensure deploy directory exists before initial clone
      ansible.builtin.file:
        path: "{{ deploy_path }}"
        state: directory
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: "0755"
      when: not deploy_git_dir.stat.exists

    - name: Remove stale initial clone directory
      ansible.builtin.file:
        path: "{{ initial_clone_path }}"
        state: absent
      when: not deploy_git_dir.stat.exists

    - name: Clone repository into temporary directory if missing
      ansible.builtin.command:
        argv:
          - sudo
          - -u
          - "{{ deploy_user }}"
          - git
          - clone
          - --branch
          - "{{ repo_version }}"
          - "{{ repo_url }}"
          - "{{ initial_clone_path }}"
      when: not deploy_git_dir.stat.exists

    - name: Copy initial repository into deploy directory
      ansible.builtin.command:
        argv:
          - cp
          - -a
          - "{{ initial_clone_path }}/."
          - "{{ deploy_path }}/"
      when: not deploy_git_dir.stat.exists

    - name: Ensure deploy directory owner after initial clone
      ansible.builtin.file:
        path: "{{ deploy_path }}"
        state: directory
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        recurse: true
      when: not deploy_git_dir.stat.exists

    - name: Remove initial clone directory
      ansible.builtin.file:
        path: "{{ initial_clone_path }}"
        state: absent
      when: not deploy_git_dir.stat.exists

    - name: Update repository
      ansible.builtin.command:
        argv:
          - sudo
          - -u
          - "{{ deploy_user }}"
          - git
          - -C
          - "{{ deploy_path }}"
          - pull
          - --ff-only

    - name: Check repository was cloned
      ansible.builtin.stat:
        path: "{{ deploy_path }}/.git"
      register: cloned_git_dir

    - name: Stop deploy if repository is missing
      ansible.builtin.fail:
        msg: "Repository was not cloned into {{ deploy_path }}"
      when: not cloned_git_dir.stat.exists

    - name: Create secrets directory
      ansible.builtin.file:
        path: "{{ deploy_path }}/secrets"
        state: directory
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: "0700"

    - name: Render production Compose environment
      ansible.builtin.template:
        src: ../templates/prod.env.j2
        dest: "{{ deploy_path }}/.env"
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: "0644"

    - name: Validate Docker secrets and normalize permissions
      ansible.builtin.shell: |
        set -eu
        secrets_dir={{ (deploy_path ~ '/secrets') | quote }}
        missing=""

        for secret in {% for secret in docker_required_secret_files %}{{ secret | quote }} {% endfor %}; do
          if [ ! -f "$secrets_dir/$secret" ]; then
            missing="${missing}${secrets_dir}/${secret}\n"
          fi
        done

        if [ -n "$missing" ]; then
          printf 'Missing server secrets:\n%b' "$missing" >&2
          exit 1
        fi

        for secret in {% for secret in docker_required_secret_files + docker_optional_secret_files %}{{ secret | quote }} {% endfor %}; do
          if [ -e "$secrets_dir/$secret" ]; then
            chown {{ deploy_user | quote }}:{{ deploy_user | quote }} "$secrets_dir/$secret"
            chmod 0444 "$secrets_dir/$secret"
          fi
        done
      changed_when: false

    - name: Render Nginx site
      ansible.builtin.template:
        src: ../templates/nginx-site.conf.j2
        dest: "{{ nginx_site_path }}"
        mode: "0644"
      register: nginx_site_result

    - name: Configure Nginx site links and validate config
      ansible.builtin.shell: |
        set -eu
        changed=0

        if [ "$(readlink {{ nginx_site_link_path | quote }} 2>/dev/null || true)" != {{ nginx_site_path | quote }} ]; then
          ln -sfn {{ nginx_site_path | quote }} {{ nginx_site_link_path | quote }}
          changed=1
        fi

        if [ -e /etc/nginx/sites-enabled/default ]; then
          rm -f /etc/nginx/sites-enabled/default
          changed=1
        fi

        nginx -t
        echo "changed=$changed"
      register: nginx_links_result
      changed_when: "'changed=1' in nginx_links_result.stdout"

    - name: Check Docker Compose files exist
      ansible.builtin.shell: |
        set -eu
        missing=""

        for compose_file in {% for compose_file in compose_files %}{{ compose_file | quote }} {% endfor %}; do
          if [ ! -f "$compose_file" ]; then
            missing="${missing}${compose_file}\n"
          fi
        done

        if [ -n "$missing" ]; then
          printf 'Missing compose files:\n%b' "$missing" >&2
          printf 'Check that repo_version=%s is pushed to GitHub and contains these files.\n' {{ repo_version | quote }} >&2
          exit 1
        fi
      changed_when: false

    - name: Ensure PostgreSQL is running before synchronizing role passwords
      ansible.builtin.shell: >
        sudo -u {{ deploy_user }} env
        PUBLIC_WEB_URL={{ public_web_url | quote }}
        PUBLIC_APP_URL={{ public_app_url | quote }}
        PUBLIC_API_GATEWAY_URL={{ public_api_gateway_url | quote }}
        PUBLIC_AUTH_URL={{ public_auth_url | quote }}
        PUBLIC_WEB_AUTH_URL={{ public_web_auth_url | quote }}
        CORS_ALLOWED_ORIGINS={{ cors_allowed_origins | quote }}
        docker compose
        {% for compose_file in compose_files %}-f {{ compose_file | quote }} {% endfor %}
        up -d postgres
      args:
        chdir: "{{ deploy_path }}"
      when: deploy_run_migrations | bool

    - name: Ensure PostgreSQL roles and databases exist
      ansible.builtin.shell: >
        sudo -u {{ deploy_user }} env
        PUBLIC_WEB_URL={{ public_web_url | quote }}
        PUBLIC_APP_URL={{ public_app_url | quote }}
        PUBLIC_API_GATEWAY_URL={{ public_api_gateway_url | quote }}
        PUBLIC_AUTH_URL={{ public_auth_url | quote }}
        PUBLIC_WEB_AUTH_URL={{ public_web_auth_url | quote }}
        CORS_ALLOWED_ORIGINS={{ cors_allowed_origins | quote }}
        docker compose
        {% for compose_file in compose_files %}-f {{ compose_file | quote }} {% endfor %}
        up postgres-bootstrap
      args:
        chdir: "{{ deploy_path }}"
      when: deploy_run_migrations | bool

    - name: Synchronize PostgreSQL role passwords with Docker secrets
      ansible.builtin.shell: |
        set -eu
        role={{ item.key | quote }}
        secret_file={{ (deploy_path ~ '/secrets/' ~ item.value) | quote }}
        password="$(tr -d '\r\n' < "$secret_file")"
        if [ -z "$password" ]; then
          echo "Empty password file: $secret_file" >&2
          exit 1
        fi
        sudo -u {{ deploy_user }} env \
          PUBLIC_WEB_URL={{ public_web_url | quote }} \
          PUBLIC_APP_URL={{ public_app_url | quote }} \
          PUBLIC_API_GATEWAY_URL={{ public_api_gateway_url | quote }} \
          PUBLIC_AUTH_URL={{ public_auth_url | quote }} \
          PUBLIC_WEB_AUTH_URL={{ public_web_auth_url | quote }} \
          CORS_ALLOWED_ORIGINS={{ cors_allowed_origins | quote }} \
          docker compose {% for compose_file in compose_files %}-f {{ compose_file | quote }} {% endfor %} \
          exec -T postgres psql -U postgres -d postgres \
          -c "ALTER ROLE \"$role\" WITH LOGIN PASSWORD '$password';"
      args:
        chdir: "{{ deploy_path }}"
      loop: "{{ postgres_role_password_files | dict2items }}"
      no_log: true
      when: deploy_run_migrations | bool

    - name: Build production migration containers
      ansible.builtin.shell: >
        sudo -u {{ deploy_user }} env
        PUBLIC_WEB_URL={{ public_web_url | quote }}
        PUBLIC_APP_URL={{ public_app_url | quote }}
        PUBLIC_API_GATEWAY_URL={{ public_api_gateway_url | quote }}
        PUBLIC_AUTH_URL={{ public_auth_url | quote }}
        PUBLIC_WEB_AUTH_URL={{ public_web_auth_url | quote }}
        CORS_ALLOWED_ORIGINS={{ cors_allowed_origins | quote }}
        docker compose
        {% for compose_file in compose_files %}-f {{ compose_file | quote }} {% endfor %}
        build {{ item | quote }}
      args:
        chdir: "{{ deploy_path }}"
      loop: "{{ migration_services }}"
      when: deploy_run_migrations | bool

    - name: Run production migrations
      ansible.builtin.shell: >
        sudo -u {{ deploy_user }} env
        PUBLIC_WEB_URL={{ public_web_url | quote }}
        PUBLIC_APP_URL={{ public_app_url | quote }}
        PUBLIC_API_GATEWAY_URL={{ public_api_gateway_url | quote }}
        PUBLIC_AUTH_URL={{ public_auth_url | quote }}
        PUBLIC_WEB_AUTH_URL={{ public_web_auth_url | quote }}
        CORS_ALLOWED_ORIGINS={{ cors_allowed_origins | quote }}
        docker compose
        {% for compose_file in compose_files %}-f {{ compose_file | quote }} {% endfor %}
        up --no-deps {{ item | quote }}
      args:
        chdir: "{{ deploy_path }}"
      loop: "{{ migration_services }}"
      when: deploy_run_migrations | bool

    - name: Start requested application stack
      ansible.builtin.shell: >
        sudo -u {{ deploy_user }} env
        PUBLIC_WEB_URL={{ public_web_url | quote }}
        PUBLIC_APP_URL={{ public_app_url | quote }}
        PUBLIC_API_GATEWAY_URL={{ public_api_gateway_url | quote }}
        PUBLIC_AUTH_URL={{ public_auth_url | quote }}
        PUBLIC_WEB_AUTH_URL={{ public_web_auth_url | quote }}
        CORS_ALLOWED_ORIGINS={{ cors_allowed_origins | quote }}
        docker compose
        {% for compose_file in compose_files %}-f {{ compose_file | quote }} {% endfor %}
        {% for profile in deploy_profiles %}--profile {{ profile | quote }} {% endfor %}
        up
        {% if deploy_detached %}-d {% endif %}
        {% if deploy_build %}--build {% endif %}
        {% for service in deploy_services %}{{ service | quote }} {% endfor %}
      args:
        chdir: "{{ deploy_path }}"

    - name: Check Certbot is installed
      ansible.builtin.command: certbot --version
      changed_when: false
      when: deploy_run_certbot | bool

    - name: Configure HTTPS with Let's Encrypt
      ansible.builtin.shell: >
        certbot --nginx --non-interactive --agree-tos --redirect
        --email {{ letsencrypt_email }}
        {% for domain in certbot_domains %}-d {{ domain }} {% endfor %}
      register: certbot_result
      changed_when: "'Certificate not yet due for renewal' not in certbot_result.stdout"
      when: deploy_run_certbot | bool

    - name: Reload Nginx
      ansible.builtin.service:
        name: nginx
        state: reloaded
      when: >
        nginx_site_result.changed
        or nginx_links_result.changed
        or (deploy_run_certbot | bool and certbot_result is defined and certbot_result.changed)
